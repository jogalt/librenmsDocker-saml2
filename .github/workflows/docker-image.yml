name: Build and Push LibreNMS Custom

on:
  push:
    branches: [ "main" ]  # Triggers when you push to main
  workflow_dispatch:      # Allows manual triggering

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Replace 'your-username' with your actual Docker Hub name
          tags: your-username/librenms-custom:latest
          # This speeds up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
